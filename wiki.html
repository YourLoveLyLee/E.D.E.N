<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E·D·E·N CORE — Lore Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #07090c;
  --surface:   #0c1118;
  --surface2:  #111820;
  --border:    #1c2a38;
  --accent:    #00e5cc;
  --accent-d:  #00a896;
  --danger:    #ff4444;
  --amber:     #ffa040;
  --text:      #b8ccd8;
  --text-b:    #e0edf5;
  --text-d:    #3f5a6a;
  --mono:      'Share Tech Mono', monospace;
  --ui:        'Rajdhani', sans-serif;
  --novel:     'Crimson Pro', Georgia, serif;
  --ns:        1.05rem;
  --nlh:       1.9;
}

html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--ui); overflow:hidden; }

/* ══════════════════════════════════════════════
   INTRO OVERLAY
══════════════════════════════════════════════ */
#intro {
  position:fixed; inset:0; background:#000; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity 0.9s ease;
}
#intro.out { opacity:0; pointer-events:none; }

.i-scanlines {
  position:absolute; inset:0; pointer-events:none;
  background: repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.28) 3px,rgba(0,0,0,.28) 4px);
  animation: scanScroll 10s linear infinite;
}
@keyframes scanScroll { from{background-position:0 0} to{background-position:0 200px} }

.i-vignette {
  position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.8) 100%);
}

.i-body { display:flex; flex-direction:column; align-items:center; gap:22px; z-index:1; text-align:center; }

.i-logo {
  font-family:var(--mono); font-size:clamp(2.8rem,6vw,4.5rem);
  letter-spacing:.35em; color:var(--accent);
  text-shadow: 0 0 30px rgba(0,229,204,.6), 0 0 80px rgba(0,229,204,.25);
  opacity:0; transform:scale(.94);
  transition: opacity .6s ease, transform .6s ease;
}
.i-logo.on { opacity:1; transform:scale(1); }
.i-logo.glitch { animation: glitch .5s steps(1,end) 2; }
@keyframes glitch {
  0%   { transform:none;          color:var(--accent); text-shadow: 0 0 30px rgba(0,229,204,.6); }
  20%  { transform:translateX(-4px); color:#fff; text-shadow:-3px 0 var(--danger),3px 0 var(--accent); }
  40%  { transform:translateX(4px);  color:#fff; text-shadow:3px 0 var(--danger),-3px 0 var(--accent); }
  60%  { transform:translateX(-2px); color:var(--accent); text-shadow:-2px 0 var(--danger); }
  80%  { transform:translateX(1px); }
  100% { transform:none; }
}

.i-sub {
  font-family:var(--mono); font-size:.62rem; letter-spacing:.45em;
  color:var(--text-d); text-transform:uppercase;
  opacity:0; transition: opacity .6s ease .25s;
}
.i-sub.on { opacity:1; }

.i-divline {
  width:200px; height:1px; background: linear-gradient(to right,transparent,var(--accent),transparent);
  opacity:0; transition: opacity .5s ease;
}
.i-divline.on { opacity:.5; }

.i-stream {
  font-family:var(--mono); font-size:.68rem; letter-spacing:.04em;
  color:rgba(0,229,204,.45); height:18px; min-width:320px; text-align:center;
  opacity:0; transition: opacity .4s ease;
}
.i-stream.on { opacity:1; }

.i-prog-wrap { width:300px; display:flex; flex-direction:column; gap:7px; opacity:0; transition:opacity .4s ease; }
.i-prog-wrap.on { opacity:1; }
.i-prog-label {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:.58rem; letter-spacing:.15em; color:var(--text-d);
}
.i-prog-track { height:2px; background:rgba(0,229,204,.12); position:relative; overflow:hidden; }
.i-prog-fill {
  height:100%; background:var(--accent);
  box-shadow:0 0 10px rgba(0,229,204,.7);
  width:0%; transition: width 3.2s cubic-bezier(.22,.68,.52,1);
}
.i-prog-fill.go { width:100%; }

.i-granted {
  font-family:var(--mono); font-size:.72rem; letter-spacing:.4em;
  color:var(--accent); opacity:0; text-transform:uppercase;
}
.i-granted.flash { animation: grantedBlink .5s ease forwards; }
@keyframes grantedBlink {
  0%  { opacity:0; }
  30% { opacity:1; text-shadow:0 0 20px var(--accent); }
  70% { opacity:1; }
  100%{ opacity:.8; }
}

/* ══════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════ */
#app {
  display:grid;
  grid-template-rows: 48px 1fr;
  grid-template-columns: 220px 1fr 280px;
  grid-template-areas: "hd hd hd" "sb cn rp";
  height:100vh;
  opacity:0; transition: opacity .7s ease;
}
#app.on { opacity:1; }

/* ── HEADER ─────────────────────────────────── */
#hd {
  grid-area:hd;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; padding:0 16px;
  position:relative; z-index:50;
}

.hd-logo {
  font-family:var(--mono); font-size:.72rem; letter-spacing:.18em;
  color:var(--accent); text-shadow:0 0 14px rgba(0,229,204,.35);
  white-space:nowrap; line-height:1.2;
  text-decoration:none;
}
.hd-logo span { display:block; font-size:.5rem; letter-spacing:.12em; color:var(--text-d); margin-top:1px; }

.hd-sep { width:1px; height:26px; background:var(--border); flex-shrink:0; }

#searchbar {
  flex:1; background:var(--bg); border:1px solid var(--border);
  color:var(--text); font-family:var(--mono); font-size:.68rem;
  padding:6px 12px; outline:none; letter-spacing:.04em;
  transition: border-color .2s, box-shadow .2s;
}
#searchbar::placeholder { color:var(--text-d); }
#searchbar:focus { border-color:rgba(0,229,204,.4); box-shadow:0 0 12px rgba(0,229,204,.08); }

.hd-btns { display:flex; gap:4px; flex-shrink:0; }
.hbtn {
  background:none; border:1px solid var(--border); color:var(--text-d);
  font-family:var(--mono); font-size:.62rem; letter-spacing:.06em;
  padding:4px 10px; cursor:pointer; transition: all .2s;
}
.hbtn:hover { border-color:var(--accent-d); color:var(--accent); }
.hbtn.hi { border-color:rgba(0,229,204,.35); color:var(--accent); background:rgba(0,229,204,.05); }

/* ── SIDEBAR ─────────────────────────────────── */
#sb {
  grid-area:sb;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}

.sb-head {
  padding:10px 14px 9px; border-bottom:1px solid var(--border);
  font-family:var(--mono); font-size:.52rem; letter-spacing:.28em;
  color:var(--text-d); text-transform:uppercase; flex-shrink:0;
}

#wiki-list { flex:1; overflow-y:auto; }
#wiki-list::-webkit-scrollbar { width:3px; }
#wiki-list::-webkit-scrollbar-thumb { background:var(--border); }

.entry { border-bottom:1px solid rgba(28,42,56,.7); }

.entry-hd {
  display:flex; align-items:center; gap:8px; padding:11px 14px;
  cursor:pointer; transition: background .15s; user-select:none;
}
.entry-hd:hover { background:rgba(0,229,204,.04); }

.entry-name {
  flex:1; font-family:var(--ui); font-size:.85rem; font-weight:600;
  color:var(--text-b); letter-spacing:.03em;
}
.tag {
  font-family:var(--mono); font-size:.48rem; letter-spacing:.08em;
  padding:2px 5px; white-space:nowrap; flex-shrink:0;
}
.tag.active { background:rgba(0,229,204,.1); color:var(--accent); border:1px solid rgba(0,229,204,.3); }
.tag.threat { background:rgba(255,68,68,.1); color:var(--danger); border:1px solid rgba(255,68,68,.3); }
.tag.loc    { background:rgba(255,160,64,.1); color:var(--amber); border:1px solid rgba(255,160,64,.3); }

.entry-arrow { font-size:.55rem; color:var(--text-d); transition: transform .22s, color .22s; flex-shrink:0; }
.entry.open .entry-arrow { transform:rotate(90deg); color:var(--accent); }

.entry-bd { max-height:0; overflow:hidden; transition: max-height .35s ease; }
.entry.open .entry-bd { max-height:280px; }

.entry-desc {
  padding:2px 14px 10px; font-family:var(--ui); font-size:.76rem;
  line-height:1.65; color:var(--text-d);
}

.entry-more {
  display:block; margin:0 14px 13px;
  background:rgba(0,229,204,.05); border:1px solid rgba(0,229,204,.22);
  color:var(--accent); font-family:var(--mono); font-size:.58rem;
  letter-spacing:.16em; padding:7px 12px; cursor:pointer; text-align:center;
  transition: all .2s; text-transform:uppercase;
}
.entry-more:hover {
  background:rgba(0,229,204,.1);
  box-shadow:0 0 14px rgba(0,229,204,.14);
}

/* ── NOVEL ───────────────────────────────────── */
#cn { grid-area:cn; display:flex; flex-direction:column; overflow:hidden; }

#tabs {
  display:flex; background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px; gap:0; overflow-x:auto; flex-shrink:0;
}
#tabs::-webkit-scrollbar { height:2px; }
#tabs::-webkit-scrollbar-thumb { background:var(--border); }

.tab {
  font-family:var(--mono); font-size:.6rem; letter-spacing:.12em;
  text-transform:uppercase; padding:13px 18px; cursor:pointer;
  color:var(--text-d); border-bottom:2px solid transparent;
  white-space:nowrap; transition: all .2s; user-select:none;
}
.tab:hover { color:var(--text); }
.tab.on { color:var(--accent); border-bottom-color:var(--accent); }

#novel-scroll { flex:1; overflow-y:auto; padding:52px 72px 72px; }
#novel-scroll::-webkit-scrollbar { width:4px; }
#novel-scroll::-webkit-scrollbar-track { background:transparent; }
#novel-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.ch-sec { display:none; animation: fadeIn .4s ease; }
.ch-sec.on { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.ch-title {
  font-family:var(--ui); font-size:1.65rem; font-weight:700;
  color:var(--text-b); letter-spacing:.04em; margin-bottom:10px;
}
.ch-bar {
  width:56px; height:2px; background:var(--accent);
  box-shadow:0 0 10px rgba(0,229,204,.5); margin-bottom:36px;
}

.novel-body {
  font-family:var(--novel); font-size:var(--ns); line-height:var(--nlh);
  color:var(--text); max-width:660px;
}
.novel-body p { margin-bottom:1.45em; }
.novel-body blockquote {
  border-left:2px solid var(--accent); padding:12px 22px;
  margin:1.6em 0; background:rgba(0,229,204,.03);
  font-style:italic; color:var(--text-b); font-size:1.04em;
}
.wl {
  color:var(--accent); cursor:pointer; border-bottom:1px solid rgba(0,229,204,.28);
  text-decoration:none; transition: all .2s;
}
.wl:hover { color:#fff; border-bottom-color:var(--accent); text-shadow:0 0 10px rgba(0,229,204,.4); }

.ch-pending {
  font-family:var(--mono); font-size:.72rem; letter-spacing:.15em;
  color:var(--text-d); border:1px solid var(--border); padding:20px 24px;
  display:inline-block; margin-bottom:1em;
}

/* ── RIGHT PANEL ────────────────────────────── */
#rp {
  grid-area:rp; background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}

.rp-head {
  padding:10px 14px 9px; border-bottom:1px solid var(--border);
  font-family:var(--mono); font-size:.52rem; letter-spacing:.28em;
  color:var(--text-d); text-transform:uppercase; flex-shrink:0;
}

#rp-scroll { flex:1; overflow-y:auto; }
#rp-scroll::-webkit-scrollbar { width:3px; }
#rp-scroll::-webkit-scrollbar-thumb { background:var(--border); }

.rp-empty {
  display:flex; align-items:center; justify-content:center;
  height:100%; font-family:var(--mono); font-size:.58rem;
  letter-spacing:.2em; color:var(--text-d); text-align:center; padding:20px;
}

#node-card { display:none; padding:18px 16px; }
#node-card.on { display:block; animation:fadeIn .3s ease; }

.nc-name { font-family:var(--ui); font-size:1.25rem; font-weight:700; color:var(--text-b); margin-bottom:3px; }
.nc-cls {
  font-family:var(--mono); font-size:.58rem; letter-spacing:.16em;
  color:var(--text-d); margin-bottom:14px;
}
.nc-div { height:1px; background:var(--border); margin:10px 0; }
.nc-label { font-family:var(--mono); font-size:.52rem; letter-spacing:.2em; color:var(--text-d); text-transform:uppercase; margin-bottom:3px; }
.nc-val { font-family:var(--ui); font-size:.8rem; color:var(--text); line-height:1.55; margin-bottom:10px; }
.nc-full-btn {
  width:100%; margin-top:8px;
  background:rgba(0,229,204,.05); border:1px solid rgba(0,229,204,.22);
  color:var(--accent); font-family:var(--mono); font-size:.58rem;
  letter-spacing:.14em; padding:8px; cursor:pointer; transition:all .2s;
  text-transform:uppercase;
}
.nc-full-btn:hover { background:rgba(0,229,204,.1); }

/* ── MANIFEST MODAL ─────────────────────────── */
#modal {
  position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:8000;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition: opacity .3s ease;
  backdrop-filter:blur(6px);
}
#modal.on { opacity:1; pointer-events:all; }

.modal-box {
  background:var(--surface); border:1px solid var(--border);
  width:700px; max-width:94vw; max-height:82vh;
  display:flex; flex-direction:column;
  transform:translateY(18px); transition:transform .3s ease;
  box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(0,229,204,.06);
}
#modal.on .modal-box { transform:translateY(0); }

.modal-hd {
  padding:14px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.modal-label {
  font-family:var(--mono); font-size:.58rem; letter-spacing:.22em;
  color:var(--accent); text-transform:uppercase;
}
.modal-x {
  background:none; border:1px solid var(--border); color:var(--text-d);
  font-family:var(--mono); font-size:.65rem; padding:4px 10px;
  cursor:pointer; transition:all .2s;
}
.modal-x:hover { border-color:var(--danger); color:var(--danger); }

.modal-scroll { flex:1; overflow-y:auto; padding:28px 30px; }
.modal-scroll::-webkit-scrollbar { width:4px; }
.modal-scroll::-webkit-scrollbar-thumb { background:var(--border); }

.mn-name { font-family:var(--ui); font-size:2.1rem; font-weight:700; color:var(--text-b); letter-spacing:.03em; margin-bottom:4px; }
.mn-cls { font-family:var(--mono); font-size:.6rem; letter-spacing:.2em; color:var(--text-d); margin-bottom:20px; }
.mn-bar { height:1px; background:linear-gradient(to right,var(--accent),transparent); margin-bottom:22px; }

.mn-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:24px; }
.mn-fl { }
.mn-fl-label { font-family:var(--mono); font-size:.52rem; letter-spacing:.2em; color:var(--text-d); text-transform:uppercase; margin-bottom:3px; }
.mn-fl-val { font-family:var(--ui); font-size:.85rem; color:var(--text); }

.mn-sec { font-family:var(--mono); font-size:.55rem; letter-spacing:.22em; color:var(--accent); text-transform:uppercase; margin:18px 0 10px; }
.mn-body { font-family:var(--novel); font-size:.97rem; line-height:1.82; color:var(--text); }
.mn-body p { margin-bottom:1em; }

/* ── FONT SIZE STATES ───────────────────────── */
body.fup   { --ns:1.15rem; }
body.fdown { --ns:.93rem; }

/* ── FULL DATABASE OVERLAY ──────────────────── */
#db-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:7000;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition: opacity .3s ease;
  backdrop-filter:blur(4px);
}
#db-overlay.on { opacity:1; pointer-events:all; }

.db-hd {
  padding:16px 28px; border-bottom:1px solid var(--border);
  background:var(--surface); display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0;
}
.db-title { font-family:var(--mono); font-size:.65rem; letter-spacing:.25em; color:var(--accent); }
.db-close {
  background:none; border:1px solid var(--border); color:var(--text-d);
  font-family:var(--mono); font-size:.65rem; padding:5px 12px; cursor:pointer; transition:all .2s;
}
.db-close:hover { border-color:var(--danger); color:var(--danger); }

.db-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px; padding:28px; overflow-y:auto;
}
.db-grid::-webkit-scrollbar { width:4px; }
.db-grid::-webkit-scrollbar-thumb { background:var(--border); }

.db-card {
  background:var(--surface); border:1px solid var(--border);
  padding:18px 20px; cursor:pointer; transition:all .22s;
  position:relative; overflow:hidden;
}
.db-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(0,229,204,.04) 0%,transparent 60%);
  opacity:0; transition:opacity .2s;
}
.db-card:hover { border-color:rgba(0,229,204,.35); }
.db-card:hover::after { opacity:1; }
.db-cn { font-family:var(--ui); font-size:1rem; font-weight:700; color:var(--text-b); margin-bottom:4px; }
.db-cc { font-family:var(--mono); font-size:.55rem; letter-spacing:.14em; color:var(--text-d); margin-bottom:10px; }
.db-cd { font-family:var(--ui); font-size:.78rem; line-height:1.6; color:var(--text-d); }
</style>
</head>
<body>

<!-- ══ INTRO ══════════════════════════════════════════════════════════ -->
<div id="intro">
  <div class="i-scanlines"></div>
  <div class="i-vignette"></div>
  <div class="i-body">
    <div class="i-logo" id="iLogo">E·D·E·N</div>
    <div class="i-sub"  id="iSub">Tactical Lore Dispatch Interface</div>
    <div class="i-divline" id="iDiv"></div>
    <div class="i-stream" id="iStream">&nbsp;</div>
    <div class="i-prog-wrap" id="iProg">
      <div class="i-prog-label">
        <span id="iMsg">INITIALIZING ARCHIVE</span>
        <span id="iPct">0%</span>
      </div>
      <div class="i-prog-track"><div class="i-prog-fill" id="iFill"></div></div>
    </div>
    <div class="i-granted" id="iGranted">[ ACCESS GRANTED ]</div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- HEADER -->
  <header id="hd">
    <a class="hd-logo" href="index.html">E·D·E·N CORE<span>Tactical Lore Dispatch Interface</span></a>
    <div class="hd-sep"></div>
    <input id="searchbar" type="text" placeholder="Filter Active Archives..." autocomplete="off" spellcheck="false">
    <div class="hd-btns">
      <button class="hbtn" id="btnSm" title="Decrease font">A−</button>
      <button class="hbtn" id="btnLg" title="Increase font">A+</button>
      <button class="hbtn hi" id="btnDb">FULL DATABASE</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sb">
    <div class="sb-head">Core Manifests</div>
    <div id="wiki-list"></div>
  </aside>

  <!-- NOVEL -->
  <main id="cn">
    <div id="tabs"></div>
    <div id="novel-scroll"></div>
  </main>

  <!-- RIGHT PANEL -->
  <aside id="rp">
    <div class="rp-head">Node Intelligence Field</div>
    <div id="rp-scroll">
      <div class="rp-empty">[ SELECT NODE — UNTIED FIELD ]</div>
      <div id="node-card">
        <div class="nc-name" id="nc-name"></div>
        <div class="nc-cls"  id="nc-cls"></div>
        <div id="nc-fields"></div>
        <button class="nc-full-btn" id="nc-full-btn">▶ View Full Manifest</button>
      </div>
    </div>
  </aside>

</div>

<!-- ══ MANIFEST MODAL ═══════════════════════════════════════════════ -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-hd">
      <div class="modal-label">Full Manifest — EDEN Core Database</div>
      <button class="modal-x" id="modalX">✕ CLOSE</button>
    </div>
    <div class="modal-scroll" id="modal-body"></div>
  </div>
</div>

<!-- ══ FULL DATABASE OVERLAY ════════════════════════════════════════ -->
<div id="db-overlay">
  <div class="db-hd">
    <div class="db-title">FULL DATABASE — ALL MANIFESTS</div>
    <button class="db-close" id="dbClose">✕ CLOSE</button>
  </div>
  <div class="db-grid" id="db-grid"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════════════
const WIKI = [
  {
    id:"arcana", name:"Arcana", tag:"active", tagLabel:"ACTIVE",
    cls:"Operator — Tier 1", aff:"DSSPD Division",
    brief:"Primary field operative assigned to deep-zone reconnaissance. Tactical profile remains partially redacted at Clearance Level 4.",
    fields:[
      {l:"Status",         v:"Active — Field Deployment"},

<p>First documented during the Breach Campaigns, Arcana distinguished herself through a series of high-attrition engagements where she operated without extraction support for extended periods. Her psychological profile describes exceptional situational compartmentalization — an ability to continue mission execution under extreme duress without cognitive degradation.</p>

<p>DSSPD is organized into three primary divisions: Perimeter Units (outer-zone patrol and threat engagement), Intelligence & Reconnaissance (field operators like Arcana), and Internal Security (monitoring and enforcement within the Stronghold). A fourth division — Special Operations — is rumored to exist but carries no official designation in the public-access database.</p>

<p>Long before the world had fallen, this planet stood through countless decades. It endured through wars and persisted through conflicts as civilizations evolved year after year, decade after decade. But then... it all soon fell.</p>
<p>The defense lines shattered in an instant.</p>
<blockquote>"THE LEFT FLANKS ARE GETTING BREACHED! WE CAN'T HOLD THEM ANY LONGER!"</blockquote>
<p>Gunshots rang out violently from left to right, swallowed by emerging screams.</p>
<p>He soon rose: <a class="wl" data-id="cataclyst">The Cataclyst</a>, also documented in core telemetry files as <a class="wl" data-id="cataclyst">The Anomaly</a>. Under his onslaught, humanity dwindled. The remnants of mankind took refuge in a final sanctuary built to store hope and peace. It was called <a class="wl" data-id="edenStronghold">EDEN Stronghold</a>.</p>

<p>In a quiet room near the civilian wing, <a class="wl" data-id="jamie">Jamie</a> sat with both hands in their lap and watched the flicker of the overhead light — the one that had been malfunctioning for three weeks and that no maintenance crew had come to fix.</p>

// ═══════════════════════════════════════════════════════════════════
//  RENDER WIKI LIST
// ═══════════════════════════════════════════════════════════════════
function renderWiki(filter="") {
  const q = filter.toLowerCase();
  const list = WIKI.filter(e =>
    !q || e.name.toLowerCase().includes(q) || e.brief.toLowerCase().includes(q)
  );
  document.getElementById("wiki-list").innerHTML = list.map(e => `
    <div class="entry" id="ent-${e.id}">
      <div class="entry-hd" onclick="toggleEntry('${e.id}')">
        <span class="entry-name">${e.name}</span>
        <span class="tag ${e.tag}">${e.tagLabel}</span>
        <span class="entry-arrow">▶</span>
      </div>
      <div class="entry-bd">
        <div class="entry-desc">${e.brief}</div>
        <button class="entry-more" onclick="event.stopPropagation();openManifest('${e.id}')">▶ View Full Manifest</button>
      </div>
    </div>
  `).join("");
}

function toggleEntry(id) {
  const el = document.getElementById("ent-"+id);
  const was = el.classList.contains("open");
  document.querySelectorAll(".entry.open").forEach(e=>e.classList.remove("open"));
  if (!was) el.classList.add("open");
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER CHAPTERS
// ═══════════════════════════════════════════════════════════════════
function renderChapters() {
  document.getElementById("tabs").innerHTML =
    CHAPTERS.map((c,i)=>`<div class="tab ${i===0?'on':''}" id="tab-${c.id}" onclick="switchCh('${c.id}')">${c.label}</div>`).join("");

  document.getElementById("novel-scroll").innerHTML =
    CHAPTERS.map((c,i)=>`
      <div class="ch-sec ${i===0?'on':''}" id="sec-${c.id}">
        <div class="ch-title">${c.title}</div>
        <div class="ch-bar"></div>
        <div class="novel-body">${c.content}</div>
      </div>
    `).join("");

  document.querySelectorAll(".wl").forEach(a=>{
    a.addEventListener("click",()=>showNode(a.dataset.id));
  });
}

function switchCh(id) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".ch-sec").forEach(s=>s.classList.remove("on"));
  document.getElementById("tab-"+id).classList.add("on");
  document.getElementById("sec-"+id).classList.add("on");
  document.getElementById("novel-scroll").scrollTop=0;
}

// ═══════════════════════════════════════════════════════════════════
//  RIGHT PANEL — NODE CARD
// ═══════════════════════════════════════════════════════════════════
let activeNodeId = null;
function showNode(id) {
  const e = WIKI.find(w=>w.id===id);
  if (!e) return;
  activeNodeId = id;
  document.querySelector(".rp-empty").style.display = "none";
  document.getElementById("nc-name").textContent = e.name;
  document.getElementById("nc-cls").textContent  = e.cls;
  document.getElementById("nc-fields").innerHTML =
    e.fields.map(f=>`<div class="nc-label">${f.l}</div><div class="nc-val">${f.v}</div>`).join('<div class="nc-div"></div>');
  const card = document.getElementById("node-card");
  card.classList.remove("on");
  void card.offsetWidth; // reflow for animation
  card.classList.add("on");
}
document.getElementById("nc-full-btn").addEventListener("click",()=>{
  if (activeNodeId) openManifest(activeNodeId);
});

// ═══════════════════════════════════════════════════════════════════
//  MANIFEST MODAL
// ═══════════════════════════════════════════════════════════════════
function openManifest(id) {
  const e = WIKI.find(w=>w.id===id);
  if (!e) return;
  document.getElementById("modal-body").innerHTML = `
    <div class="mn-name">${e.name}</div>
    <div class="mn-cls">${e.cls} &nbsp;//&nbsp; ${e.aff}</div>
    <div class="mn-bar"></div>
    <div class="mn-grid">
      ${e.fields.map(f=>`<div class="mn-fl"><div class="mn-fl-label">${f.l}</div><div class="mn-fl-val">${f.v}</div></div>`).join("")}
    </div>
    <div class="mn-sec">// Intelligence Summary</div>
    <div class="mn-body">${e.full}</div>
  `;
  document.getElementById("modal").classList.add("on");
  showNode(id);
}
document.getElementById("modalX").addEventListener("click",()=>document.getElementById("modal").classList.remove("on"));
document.getElementById("modal").addEventListener("click",e=>{if(e.target===document.getElementById("modal"))document.getElementById("modal").classList.remove("on")});

// ═══════════════════════════════════════════════════════════════════
//  FULL DATABASE OVERLAY
// ═══════════════════════════════════════════════════════════════════
function renderDB() {
  document.getElementById("db-grid").innerHTML = WIKI.map(e=>`
    <div class="db-card" onclick="openManifest('${e.id}');document.getElementById('db-overlay').classList.remove('on')">
      <div class="db-cn">${e.name}</div>
      <div class="db-cc">${e.cls}</div>
      <div class="db-cd">${e.brief}</div>
    </div>
  `).join("");
}
document.getElementById("btnDb").addEventListener("click",()=>{renderDB();document.getElementById("db-overlay").classList.add("on")});
document.getElementById("dbClose").addEventListener("click",()=>document.getElementById("db-overlay").classList.remove("on"));

// ═══════════════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════════════
document.getElementById("searchbar").addEventListener("input",e=>renderWiki(e.target.value.trim()));

// ═══════════════════════════════════════════════════════════════════
//  FONT SIZE
// ═══════════════════════════════════════════════════════════════════
let fState = 0;
document.getElementById("btnLg").addEventListener("click",()=>{
  fState = Math.min(1, fState+1);
  document.body.classList.remove("fup","fdown");
  if (fState===1) document.body.classList.add("fup");
});
document.getElementById("btnSm").addEventListener("click",()=>{
  fState = Math.max(-1, fState-1);
  document.body.classList.remove("fup","fdown");
  if (fState===-1) document.body.classList.add("fdown");
});

// ═══════════════════════════════════════════════════════════════════
//  INTRO SEQUENCE (runs once per session via sessionStorage)
// ═══════════════════════════════════════════════════════════════════
const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/\\|.-_:><[]{}!@#";
function randStr(n=44){return Array.from({length:n},()=>CHARS[Math.floor(Math.random()*CHARS.length)]).join("")}

const MSGS = ["DECRYPTING MANIFEST KEYS","LOADING TELEMETRY FILES","VERIFYING OPERATOR IDs","UNLOCKING ARCHIVE ACCESS","SYNCING NODE DATABASE"];

function runIntro() {
  const logo    = document.getElementById("iLogo");
  const sub     = document.getElementById("iSub");
  const divl    = document.getElementById("iDiv");
  const stream  = document.getElementById("iStream");
  const prog    = document.getElementById("iProg");
  const fill    = document.getElementById("iFill");
  const pct     = document.getElementById("iPct");
  const msg     = document.getElementById("iMsg");
  const granted = document.getElementById("iGranted");
  let streamInt, pctInt, msgInt;

  // Phase 1 — logo fade in
  setTimeout(()=>logo.classList.add("on"), 400);

  // Phase 2 — glitch
  setTimeout(()=>{logo.classList.add("glitch"); setTimeout(()=>logo.classList.remove("glitch"),600)}, 900);

  // Phase 3 — subtitle + divider
  setTimeout(()=>{ sub.classList.add("on"); divl.classList.add("on"); }, 1100);

  // Phase 4 — stream + progress
  setTimeout(()=>{
    stream.classList.add("on");
    prog.classList.add("on");

    // Random data stream
    streamInt = setInterval(()=>{ stream.textContent = randStr(44); },75);

    // Cycling status messages
    let mi = 0;
    msgInt = setInterval(()=>{ mi=(mi+1)%MSGS.length; msg.textContent = MSGS[mi]; },700);

    // Percent counter (smooth, finishes in ~3.2s)
    let p = 0;
    pctInt = setInterval(()=>{
      p = Math.min(100, p + Math.floor(Math.random()*3)+1);
      pct.textContent = p+"%";
      if (p>=100) clearInterval(pctInt);
    },45);

    // Start fill bar
    requestAnimationFrame(()=>{ fill.classList.add("go"); });
  }, 1500);

  // Phase 5 — ACCESS GRANTED
  setTimeout(()=>{
    clearInterval(streamInt); clearInterval(msgInt);
    stream.textContent = "ARCHIVE ACCESS VERIFIED — ALL MANIFESTS UNLOCKED";
    msg.textContent    = "COMPLETE";
    pct.textContent    = "100%";
    granted.classList.add("flash");
  }, 4900);

  // Phase 6 — Transition to main
  setTimeout(()=>{
    sessionStorage.setItem("eden_session","1");
    document.getElementById("intro").classList.add("out");
    document.getElementById("app").classList.add("on");
    setTimeout(()=>{ document.getElementById("intro").style.display="none"; }, 1000);
  }, 5500);
}

function showMain() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("app").classList.add("on");
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", ()=>{
  renderWiki();
  renderChapters();
  if (sessionStorage.getItem("eden_session")) {
    showMain();
  } else {
    runIntro();
  }
});
</script>
